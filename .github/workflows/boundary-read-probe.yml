name: Boundary read probe

on:
  workflow_dispatch:
    inputs:
      target_owner:
        description: Owner or org of a researcher-owned target repo
        required: true
        type: string
      target_repo:
        description: Researcher-owned target repo name
        required: true
        type: string

permissions:
  contents: read
  actions: read
  issues: read
  packages: read

jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - name: Probe read boundaries
        env:
          GH_TOKEN: ${{ github.token }}
          TARGET_OWNER: ${{ inputs.target_owner }}
          TARGET_REPO: ${{ inputs.target_repo }}
        run: |
          set -eu

          api() {
            label="$1"
            path="$2"
            code="$(curl -sS -o /tmp/gh_probe_response.json -w '%{http_code}' \
              -H "Authorization: Bearer ${GH_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com${path}")"

            bytes="$(wc -c < /tmp/gh_probe_response.json | tr -d ' ')"
            echo "${label}: status=${code} bytes=${bytes}"
            if [ "${code}" = "200" ]; then
              head -c 300 /tmp/gh_probe_response.json
              echo
            fi
          }

          echo "Source repo: ${GITHUB_REPOSITORY}"
          echo "Target repo: ${TARGET_OWNER}/${TARGET_REPO}"

          api "repo metadata" "/repos/${TARGET_OWNER}/${TARGET_REPO}"
          api "repo contents root" "/repos/${TARGET_OWNER}/${TARGET_REPO}/contents"
          api "issues" "/repos/${TARGET_OWNER}/${TARGET_REPO}/issues?per_page=1"
          api "releases" "/repos/${TARGET_OWNER}/${TARGET_REPO}/releases?per_page=1"
          api "actions artifacts" "/repos/${TARGET_OWNER}/${TARGET_REPO}/actions/artifacts?per_page=1"
          api "actions workflows" "/repos/${TARGET_OWNER}/${TARGET_REPO}/actions/workflows?per_page=1"

          echo "Expected for unauthorized private target: 403 or 404."
